  body{
    margin:0;
    background:transparent;
    color:var(--ink);
    font-family:'Plus Jakarta Sans', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{
    font-family:'Fraunces', serif;
    font-weight:600;
    letter-spacing:-0.01em;
    margin:0;
  }
  .wrap{max-width:1080px;margin:0 auto;padding:0 28px;}

  /* NAV */
  nav{display:flex;align-items:center;justify-content:space-between;padding:28px 0;}
  .nav-right{display:flex;align-items:center;gap:10px;}
  .logo{display:flex;align-items:center;gap:10px;font-family:'Fraunces',serif;font-weight:600;font-size:19px;}
  .logo-dot{width:11px;height:11px;border-radius:50%;background:conic-gradient(var(--coral),var(--gold),var(--teal),var(--peri),var(--coral));}
  .tag{font-size:13px;color:var(--ink-soft);}

  /* HERO */
  .hero{padding:36px 0 48px;}
  .eyebrow{font-size:13px;font-weight:600;color:var(--coral);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:14px;}
  .hero h1{font-size:clamp(34px,5vw,52px);line-height:1.05;}
  .hero p.sub{margin-top:16px;font-size:16.5px;color:var(--ink-soft);max-width:46ch;line-height:1.6;}


  /* FORM CARD */
  .card{
    padding:8px 0 32px;
  }
  .section-title{font-size:22px;margin-bottom:6px;}
  .section-sub{font-size:14px;color:var(--ink-soft);margin-bottom:24px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  @media (max-width:640px){ .grid2{grid-template-columns:1fr;} }
  label{font-size:13px;font-weight:600;color:var(--ink);display:block;margin-bottom:7px;}
  input[type=text], input[type=number], select, textarea{
    width:100%;
    border:1.5px solid var(--line);
    border-radius:12px;
    padding:11px 13px;
    font-family:inherit;
    font-size:14.5px;
    color:var(--ink);
    background:#fffdf9;
    outline:none;
    transition:border-color .15s ease;
  }
  input:focus, select:focus, textarea:focus{border-color:var(--peri);}
  .field{margin-bottom:18px;}
  .pillrow{display:flex;gap:8px;flex-wrap:wrap;}
  .pill{
    border:1.5px solid var(--line);
    background:#fffdf9;
    padding:9px 15px;
    border-radius:100px;
    font-size:13.5px;
    font-weight:600;
    cursor:pointer;
    color:var(--ink-soft);
    transition:.15s ease;
  }
  .pill.active{background:var(--ink);border-color:var(--ink);color:#fff;}
  .genre-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
  @media (max-width:820px){.genre-grid{grid-template-columns:repeat(3,1fr);}}
  @media (max-width:480px){.genre-grid{grid-template-columns:repeat(2,1fr);}}
  .genre-opt{
    border:1.5px solid var(--line);
    border-radius:14px;
    padding:12px 10px;
    text-align:center;
    cursor:pointer;
    font-size:13px;
    font-weight:700;
    color:var(--ink-soft);
    background:#fffdf9;
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .genre-opt .emoji{font-size:20px;display:block;margin-bottom:4px;}
  .genre-opt:hover{animation:genre-shake 0.4s ease;box-shadow:0 6px 14px -6px rgba(36,30,51,0.28);}
  .genre-opt.active{
    border-color:var(--accent,var(--peri));
    color:#fff;
    background:var(--accent,var(--peri));
  }
  @keyframes genre-shake{
    0%,100%{transform:translateX(0) rotate(0);}
    20%{transform:translateX(-3px) rotate(-3deg);}
    40%{transform:translateX(3px) rotate(3deg);}
    60%{transform:translateX(-2px) rotate(-2deg);}
    80%{transform:translateX(2px) rotate(2deg);}
  }

  .btn-primary{
    width:100%;
    border:none;
    border-radius:14px;
    padding:15px 20px;
    background:var(--ink);
    color:#fff;
    font-family:inherit;
    font-weight:700;
    font-size:15.5px;
    cursor:pointer;
    margin-top:6px;
    transition:transform .12s ease, opacity .12s ease;
  }
  .btn-primary:hover{transform:translateY(-1px);}
  .btn-primary:disabled{opacity:0.55;cursor:default;transform:none;}
  .error-msg{margin-top:12px;font-size:13.5px;color:#C4472F;background:#FDEDEA;border:1px solid #F3CFC6;padding:10px 13px;border-radius:10px;}

  /* PIPELINE */
  .loader{margin-top:26px;display:flex;flex-direction:column;align-items:center;gap:14px;padding:8px 0;}
  .loader-spinner{
    width:34px;height:34px;border-radius:50%;
    border:3px solid var(--line);
    border-top-color:var(--peri);
    animation:spin 0.9s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .loader-text{font-size:14px;font-weight:600;color:var(--ink-soft);}

  /* RESULT */
  .result{margin-top:56px;}
  .back-btn{margin-bottom:18px;}
  .tabs{display:flex;gap:8px;margin-bottom:20px;}
  .tab{
    padding:9px 18px;border-radius:100px;border:1.5px solid var(--line);
    background:#fffdf9;font-weight:700;font-size:13.5px;color:var(--ink-soft);cursor:pointer;
  }
  .tab.active{background:var(--ink);border-color:var(--ink);color:#fff;}
  .story-card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:38px;box-shadow:var(--shadow);}
  .story-title{font-size:26px;margin-bottom:22px;}
  .story-text{font-family:'Fraunces',serif;font-size:18.5px;line-height:1.85;color:var(--ink);}
  .story-text span{transition:background .25s ease, box-shadow .25s ease;border-radius:5px;padding:1px 2px;}
  .story-text span.reading{background:#FFEFD8;box-shadow:0 0 0 2px #FFEFD8;}
  .listen-panel{display:flex;flex-direction:column;align-items:center;gap:20px;padding:24px 0;}
  .transport{display:flex;align-items:center;gap:14px;}
  .transport button{
    border:none;background:var(--ink);color:#fff;width:52px;height:52px;border-radius:50%;
    font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  }
  .transport button.ghost{background:#fffdf9;border:1.5px solid var(--line);color:var(--ink);width:44px;height:44px;}
  .bars{display:flex;align-items:flex-end;gap:4px;height:34px;}
  .bars span{width:4px;background:var(--peri);border-radius:2px;animation:bar 1.1s ease-in-out infinite;}
  .bars span:nth-child(2){animation-delay:.1s;background:var(--coral);}
  .bars span:nth-child(3){animation-delay:.2s;background:var(--gold);}
  .bars span:nth-child(4){animation-delay:.3s;background:var(--teal);}
  .bars span:nth-child(5){animation-delay:.15s;background:var(--peri);}
  .bars.paused span{animation-play-state:paused;height:6px !important;}
  @keyframes bar{0%,100%{height:6px;}50%{height:30px;}}
  .mood-tag{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);}
  .actions{display:flex;gap:10px;margin-top:26px;flex-wrap:wrap;}
  .btn-ghost{
    border:1.5px solid var(--line);background:#fffdf9;color:var(--ink);
    padding:10px 16px;border-radius:12px;font-weight:700;font-size:13.5px;cursor:pointer;
  }
  footer{text-align:center;padding:50px 0 40px;font-size:12.5px;color:var(--ink-soft);}

  .save-msg{margin-top:12px;font-size:13px;color:var(--teal);font-weight:600;min-height:16px;}

  .modal-overlay{
    display:none;
    position:fixed;inset:0;
    background:rgba(36,30,51,0.45);
    align-items:center;justify-content:center;
    padding:24px;
    z-index:50;
  }
  .modal-overlay.open{display:flex;}
  .modal{
    background:var(--card);
    border-radius:20px;
    width:100%;
    max-width:560px;
    max-height:80vh;
    overflow-y:auto;
    padding:26px;
    box-shadow:var(--shadow);
  }
  .modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
  .ghost-x{border:none;background:none;font-size:16px;cursor:pointer;color:var(--ink-soft);width:32px;height:32px;border-radius:50%;}
  .ghost-x:hover{background:var(--bg);}
  .saved-list{display:flex;flex-direction:column;gap:10px;}
  .saved-empty{font-size:14px;color:var(--ink-soft);text-align:center;padding:30px 0;}
  .saved-item{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    border:1.5px solid var(--line);border-radius:14px;padding:13px 15px;
  }
  .saved-item-info{display:flex;flex-direction:column;gap:2px;}
  .saved-item-title{font-family:'Fraunces',serif;font-weight:600;font-size:15.5px;}
  .saved-item-meta{font-size:12.5px;color:var(--ink-soft);}
  .saved-item-actions{display:flex;gap:6px;flex-shrink:0;}
  .saved-item-actions button{
    border:1.5px solid var(--line);background:#fffdf9;border-radius:10px;
    padding:7px 11px;font-size:12.5px;font-weight:700;cursor:pointer;color:var(--ink);
  }
  .saved-item-actions button.danger{color:#C4472F;}
</style>
</head>
<body>
<div class="page-bg"></div>
<div class="wrap">

  <nav>
    <div class="logo"><span class="logo-dot"></span>Tuckinn</div>
    <div class="nav-right">
      <button class="btn-ghost" id="myStoriesBtn">My Stories</button>
    </div>
  </nav>

  <section class="hero" id="heroSection">
    <h1>Every bedtime, a<br>new story made for<br>them.</h1>
  </section>

  <section class="card" id="formSection">
    <div class="grid2">
      <div class="field">
        <label for="childName">Child's name</label>
        <input type="text" id="childName" placeholder="e.g. Mira" maxlength="24">
      </div>
      <div class="field">
        <label for="childAge">Age</label>
        <input type="number" id="childAge" min="2" max="10" value="5">
      </div>
    </div>

    <div class="field">
      <label for="friendName">Character's name (optional)</label>
      <input type="text" id="friendName" placeholder="e.g. a dragon named Ember">
    </div>

    <div class="field">
      <label>Story length</label>
      <div class="pillrow" id="lengthRow">
        <div class="pill" data-val="short">Short · 2 min</div>
        <div class="pill active" data-val="medium">Medium · 4 min</div>
        <div class="pill" data-val="long">Long · 7 min</div>
      </div>
    </div>

    <div class="field">
      <label>Pick a genre to create the story</label>
      <div class="genre-grid" id="genreGrid"></div>
    </div>

    <button class="btn-primary" id="playStoryBtn">▶ Play story</button>

    <div id="errorBox"></div>

    <div class="loader" id="pipeline" style="display:none;">
      <div class="loader-spinner"></div>
      <div class="loader-text" id="loaderText">Weaving your story…</div>
    </div>
  </section>

  <section class="result" id="resultSection" style="display:none;">
    <button class="btn-ghost back-btn" id="backBtn">← Back</button>
    <div class="tabs">
      <div class="tab active" id="tabRead">Read</div>
      <div class="tab" id="tabListen">Listen</div>
    </div>

    <div class="story-card">
      <div class="story-title" id="storyTitle"></div>

      <div id="readView">
        <div class="story-text" id="storyText"></div>
      </div>

      <div id="listenView" style="display:none;">
        <div class="listen-panel">
          <div class="bars paused" id="bars">
            <span></span><span></span><span></span><span></span><span></span>
          </div>
          <div class="transport">
            <button class="ghost" id="replayBtn" title="Replay">⟲</button>
            <button id="playBtn" title="Play">▶</button>
            <button class="ghost" id="stopBtn" title="Stop">■</button>
          </div>
          <div class="mood-tag" id="moodTag">—</div>
        </div>
      </div>

      <div class="actions">
        <button class="btn-ghost" id="saveBtn">💾 Save story</button>
        <button class="btn-ghost" id="downloadBtn">Download story (.txt)</button>
        <button class="btn-ghost" id="newStoryBtn">Start a new story</button>
      </div>
      <div id="saveMsg" class="save-msg"></div>
    </div>
  </section>

  <footer>Tuckinn · a new story every night.</footer>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-head">
      <div class="section-title" style="margin:0;">My Stories</div>
      <button class="ghost-x" id="closeModalBtn">✕</button>
    </div>
    <div id="savedList" class="saved-list"></div>
  </div>
</div>

<script>
const genres = [
  {id:'dinosaurs', label:'Dinosaurs', emoji:'🦕', accent:'#2FA79A', pastelBg:'#DCF1E7', pastelBorder:'#B7E1D0'},
  {id:'superheroes', label:'Superheroes', emoji:'🦸', accent:'#FF7A5C', pastelBg:'#FDE3DC', pastelBorder:'#F6C3B4'},
  {id:'princesses', label:'Princesses', emoji:'👑', accent:'#F0AC3D', pastelBg:'#FCEFD6', pastelBorder:'#F4DBA6'},
  {id:'pirates', label:'Pirates', emoji:'🏴‍☠️', accent:'#4A4EC9', pastelBg:'#E1E3F7', pastelBorder:'#C4C8ED'},
  {id:'space', label:'Space', emoji:'🚀', accent:'#4A4EC9', pastelBg:'#E3E0F8', pastelBorder:'#C8C2EE'},
  {id:'animals', label:'Animals', emoji:'🦊', accent:'#2FA79A', pastelBg:'#E1F0DE', pastelBorder:'#C1E1BC'},
  {id:'underwater', label:'Underwater', emoji:'🧜', accent:'#2FA79A', pastelBg:'#D9EFEC', pastelBorder:'#B4DFD9'},
  {id:'robots', label:'Robots', emoji:'🤖', accent:'#6C6FF0', pastelBg:'#E6E4FA', pastelBorder:'#CFCBF2'},
  {id:'feelgood', label:'Feel Good', emoji:'💛', accent:'#F0AC3D', pastelBg:'#FDF3CE', pastelBorder:'#F8E49B'},
  {id:'fantasy', label:'Fantasy', emoji:'🦄', accent:'#6C6FF0', pastelBg:'#EEE3FA', pastelBorder:'#DEC7F3'},
  {id:'mystery', label:'Mystery', emoji:'🔍', accent:'#4A4EC9', pastelBg:'#E2E6F5', pastelBorder:'#C6CCE9'},
  {id:'silly', label:'Silly', emoji:'🤪', accent:'#FF7A5C', pastelBg:'#FDE2ED', pastelBorder:'#F8BFD6'},
  {id:'heartwarming', label:'Heartwarming', emoji:'🌈', accent:'#FF7A5C', pastelBg:'#FCE5DB', pastelBorder:'#F6C6B3'},
  {id:'adventure', label:'Adventure', emoji:'🧭', accent:'#2FA79A', pastelBg:'#E2F0DF', pastelBorder:'#C4E2BE'},
  {id:'magic', label:'Magic', emoji:'✨', accent:'#6C6FF0', pastelBg:'#EBE4FB', pastelBorder:'#D6CAF5'},
];
let selectedGenre = null;
let selectedLength = 'medium';

const genreGrid = document.getElementById('genreGrid');
genres.forEach(g=>{
  const el = document.createElement('div');
  el.className = 'genre-opt';
  el.style.setProperty('--accent', g.accent);
  el.innerHTML = `<span class="emoji">${g.emoji}</span>${g.label}`;
  el.onclick = ()=>{
    selectedGenre = g.id;
    document.querySelectorAll('.genre-opt').forEach(o=>o.classList.remove('active'));
    el.classList.add('active');
  };
  genreGrid.appendChild(el);
});

document.getElementById('playStoryBtn').onclick = ()=> generateStory();

document.querySelectorAll('#lengthRow .pill').forEach(p=>{
  p.onclick = ()=>{
    selectedLength = p.dataset.val;
    document.querySelectorAll('#lengthRow .pill').forEach(x=>x.classList.remove('active'));
    p.classList.add('active');
  };
});

const loaderMessages = ['Weaving your story…', 'Choosing the words…', 'Almost ready…'];
let loaderInterval = null;
function showLoader(){
  const el = document.getElementById('pipeline');
  el.style.display = 'flex';
  let i = 0;
  document.getElementById('loaderText').textContent = loaderMessages[0];
  loaderInterval = setInterval(()=>{
    i = (i+1) % loaderMessages.length;
    document.getElementById('loaderText').textContent = loaderMessages[i];
  }, 1400);
}
function hideLoader(){
  document.getElementById('pipeline').style.display = 'none';
  if(loaderInterval){ clearInterval(loaderInterval); loaderInterval = null; }
}

const lengthWords = {short:'120 to 170', medium:'260 to 340', long:'450 to 600'};

let isGenerating = false;
async function generateStory(){
  const name = document.getElementById('childName').value.trim();
  const age = document.getElementById('childAge').value;
  const friendName = document.getElementById('friendName').value.trim();
  const errorBox = document.getElementById('errorBox');
  errorBox.innerHTML = '';

  if(!name){
    errorBox.innerHTML = "<div class=\"error-msg\">Add the child's name so the story can be written for them.</div>";
    return;
  }
  if(!selectedGenre){
    errorBox.innerHTML = '<div class="error-msg">Pick a genre to start the story.</div>';
    return;
  }
  if(isGenerating) return;
  isGenerating = true;

  document.getElementById('resultSection').style.display = 'none';
  showLoader();

  const g = genres.find(x=>x.id===selectedGenre);
  const friendLine = friendName ? `Include another character in the story named "${friendName}" (a friend, creature, or companion who fits the genre) alongside ${name}.` : ``;

  const sparkPool = [
    'a map that redraws itself when you\'re not looking',
    'a door in an ordinary place that leads somewhere extraordinary just once',
    'an object that hums or glows only when someone nearby needs help',
    'a small creature who has lost something precious and can\'t remember what',
    'a place that only appears at a certain time of day',
    'a friendly rival who wants the same thing for a different reason',
    'a weather event that behaves in a magical, unusual way',
    'an old keeper or guide who speaks in riddles but means well',
    'a chain of small favors that leads to a big surprise',
    'a competition or game with an unexpected, kinder way to win',
    'a lost letter, song, or recipe that needs to be completed',
    'a shy character who turns out to be the bravest one there',
    'a shortcut that turns out to be the longer, better way after all',
    'a tiny mistake that accidentally saves the day later on',
    'two very different characters who have to work together to get home',
  ];
  const shuffled = sparkPool.sort(()=>Math.random()-0.5);
  const sparks = shuffled.slice(0, 2);

  const systemPrompt = `You are a celebrated children's storyteller, in the tradition of classic illustrated storybooks and the beloved warmth of golden-age animated features. Write a bedtime story with that same charm: vivid, sensory scene-setting; characters with real personality and a bit of playful humor in how they talk; a clear little challenge the protagonist wants to overcome; small, satisfying moments of wonder; and a warm, cozy resolution. Do not reference or copy any real franchise, brand, or copyrighted character by name — invent everything fresh, in that spirit rather than that letter.

Rules:
- Protagonist is a child named ${name}, age ${age}.
- Genre: ${g.label}.
- Length: ${lengthWords[selectedLength]} words total.
- ${friendLine}
- Weave in at least one of these story sparks for inspiration, adapted naturally to fit: ${sparks.join('; ')}.
- Give the world a couple of specific, memorable sensory details (a sound, a smell, a color) rather than generic description.
- Let the protagonist have one small, distinct personality trait that shapes how they solve the challenge.
- Choose one gentle, age-appropriate moral and weave it in naturally, without stating it outright.
- Make this story genuinely different in premise, setting, and shape from a typical formulaic bedtime story — surprise the reader a little.
- Gentle pacing, softer and calmer toward the end, suitable to read right before sleep. No scary violence, no peril that isn't resolved kindly.
- Respond ONLY with strict JSON, no markdown fences, no preamble, matching exactly this shape:
{"title": "string", "sentences": [{"text": "string", "mood": "one of happy|exciting|curious|brave|calm|cozy|magical|gentle-sad|triumphant"}]}
- Break the story into natural sentences, each its own array entry, in order.
- The JSON must be valid and parseable.`;

  try{
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1500,
        temperature: 1,
        system: systemPrompt,
        messages: [{role:"user", content:`Write the bedtime story now, as strict JSON only.`}]
      })
    });

    if(!response.ok){
      throw new Error('The story service had trouble responding (status ' + response.status + ').');
    }
    const data = await response.json();
    const textBlock = (data.content || []).find(c=>c.type==='text');
    if(!textBlock) throw new Error('No story text came back.');
    let raw = textBlock.text.trim();
    raw = raw.replace(/^```json/,'').replace(/^```/,'').replace(/```$/,'').trim();
    let parsed;
    try{ parsed = JSON.parse(raw); }
    catch(e){ throw new Error('The story came back in a shape we could not read.'); }

    hideLoader();
    renderStory(parsed, name);
    showStoryPage();
    tabListen.click();
    startNarration();

  }catch(err){
    hideLoader();
    errorBox.innerHTML = `<div class="error-msg">Something went wrong: ${err.message}. Try again.</div>`;
  }finally{
    isGenerating = false;
  }
}

function showStoryPage(){
  document.getElementById('heroSection').style.display = 'none';
  document.getElementById('formSection').style.display = 'none';
  document.getElementById('resultSection').style.display = 'block';
  window.scrollTo(0, 0);
}
function showFormPage(){
  document.getElementById('heroSection').style.display = '';
  document.getElementById('formSection').style.display = '';
  hideLoader();
  document.getElementById('resultSection').style.display = 'none';
  window.scrollTo(0, 0);
}

let currentStory = null; // {title, sentences}
let currentChildName = '';
let currentGenreId = null;

function renderStory(parsed, name){
  currentStory = parsed;
  currentChildName = name;
  currentGenreId = selectedGenre;
  document.getElementById('saveMsg').textContent = '';
  document.getElementById('storyTitle').textContent = parsed.title || `A story for ${name}`;
  const container = document.getElementById('storyText');
  container.innerHTML = '';
  parsed.sentences.forEach((s, i)=>{
    const span = document.createElement('span');
    span.id = 'sent-'+i;
    span.textContent = s.text + ' ';
    container.appendChild(span);
  });
}

document.getElementById('backBtn').onclick = ()=>{
  stopNarration();
  showFormPage();
};
document.getElementById('newStoryBtn').onclick = ()=>{
  stopNarration();
  selectedGenre = null;
  document.querySelectorAll('.genre-opt').forEach(o=>o.classList.remove('active'));
  showFormPage();
};
document.getElementById('downloadBtn').onclick = ()=>{
  if(!currentStory) return;
  const text = currentStory.title + '\\n\\n' + currentStory.sentences.map(s=>s.text).join(' ');
  const blob = new Blob([text], {type:'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = (currentStory.title || 'bedtime-story').replace(/[^a-z0-9]+/gi,'-').toLowerCase() + '.txt';
  a.click();
  URL.revokeObjectURL(url);
};

// ---- Tabs ----
const tabRead = document.getElementById('tabRead');
const tabListen = document.getElementById('tabListen');
tabRead.onclick = ()=>{
  tabRead.classList.add('active'); tabListen.classList.remove('active');
  document.getElementById('readView').style.display='block';
  document.getElementById('listenView').style.display='none';
};
tabListen.onclick = ()=>{
  tabListen.classList.add('active'); tabRead.classList.remove('active');
  document.getElementById('readView').style.display='none';
  document.getElementById('listenView').style.display='block';
};

// ---- Narration (Web Speech API) ----
const moodVoiceMap = {
  'happy':      {rate:1.0,  pitch:1.12},
  'exciting':   {rate:1.08, pitch:1.15},
  'curious':    {rate:0.95, pitch:1.08},
  'brave':      {rate:0.95, pitch:1.0},
  'calm':       {rate:0.85, pitch:0.95},
  'cozy':       {rate:0.82, pitch:0.92},
  'magical':    {rate:0.88, pitch:1.08},
  'gentle-sad': {rate:0.78, pitch:0.85},
  'triumphant': {rate:1.0,  pitch:1.08},
};
// Wisp: a single, fixed storyteller persona — gentle, whimsical, a little enchanted,
// pitched slightly airy and paced slowly like a read-aloud storybook.
const narratorPersona = {rate:0.76, pitch:1.06};

let voicesList = [];
function loadVoices(){ voicesList = window.speechSynthesis ? window.speechSynthesis.getVoices() : []; }
if('speechSynthesis' in window){
  loadVoices();
  window.speechSynthesis.onvoiceschanged = loadVoices;
}
// Prefer higher-quality, more natural-sounding system voices where available,
// falling back gracefully to any English voice, then any voice at all.
const preferredVoiceNames = [
  'Google UK English Female', 'Google US English',
  'Samantha', 'Karen', 'Moira', 'Serena', 'Tessa',
  'Microsoft Aria Online (Natural)', 'Microsoft Libby Online (Natural)',
  'Microsoft Sonia Online (Natural)', 'Microsoft Jenny Online (Natural)',
];
function pickVoice(){
  for(const name of preferredVoiceNames){
    const match = voicesList.find(v=>v.name === name);
    if(match) return match;
  }
  const enFemale = voicesList.find(v=>v.lang && v.lang.toLowerCase().startsWith('en') && /female/i.test(v.name));
  if(enFemale) return enFemale;
  const en = voicesList.filter(v=>v.lang && v.lang.toLowerCase().startsWith('en'));
  return (en[0] || voicesList[0] || null);
}

let narrationQueue = [];
let narrationIndex = 0;
let isPlaying = false;

function stopNarration(){
  if('speechSynthesis' in window) window.speechSynthesis.cancel();
  isPlaying = false;
  narrationIndex = 0;
  document.querySelectorAll('.story-text span.reading').forEach(s=>s.classList.remove('reading'));
  document.getElementById('bars').classList.add('paused');
  document.getElementById('playBtn').textContent = '▶';
  document.getElementById('moodTag').textContent = '—';
}

const moodPauseMs = {
  happy:340, exciting:240, curious:400, brave:340, calm:680, cozy:740,
  magical:520, 'gentle-sad': 800, triumphant:440,
};
function pauseForSentence(text, mood){
  let p = moodPauseMs[mood] ?? 450;
  const trimmed = text.trim();
  if(/\.\.\.$/.test(trimmed)) p += 400;
  else if(/[!?]$/.test(trimmed)) p += 140;
  return p;
}
function pauseForClause(text){
  const trimmed = text.trim();
  if(/[;:]$/.test(trimmed)) return 320;
  return 220; // short breath after a comma-level clause
}

// Split a sentence into clause-sized chunks at commas/semicolons/colons/dashes
// so the narrator takes small breaths mid-sentence, like a read-aloud storybook.
function splitClauses(text){
  const raw = text.split(/([,;:]|—|–)\s+/);
  const clauses = [];
  let current = '';
  for(let i=0;i<raw.length;i++){
    if(i % 2 === 0){
      current += raw[i];
    }else{
      current += raw[i];
      if(current.trim()) clauses.push(current.trim());
      current = '';
    }
  }
  if(current.trim()) clauses.push(current.trim());
  return clauses.length ? clauses : [text];
}

function buildNarrationQueue(sentences){
  const queue = [];
  sentences.forEach((s, sentenceIndex)=>{
    const clauses = splitClauses(s.text);
    clauses.forEach((c, i)=>{
      queue.push({
        text: c,
        mood: s.mood,
        sentenceIndex,
        isLastClause: i === clauses.length - 1,
      });
    });
  });
  return queue;
}

function speakNext(){
  if(!narrationQueue.length || narrationIndex >= narrationQueue.length){
    stopNarration();
    return;
  }
  const item = narrationQueue[narrationIndex];
  document.querySelectorAll('.story-text span.reading').forEach(el=>el.classList.remove('reading'));
  const el = document.getElementById('sent-'+item.sentenceIndex);
  if(el) el.classList.add('reading');
  document.getElementById('moodTag').textContent = item.mood.replace('-', ' ');

  const utter = new SpeechSynthesisUtterance(item.text);
  const base = narratorPersona;
  const moodAdj = moodVoiceMap[item.mood] || moodVoiceMap.calm;
  utter.rate = Math.min(1.15, Math.max(0.55, base.rate * moodAdj.rate));
  utter.pitch = Math.min(1.6, Math.max(0.55, base.pitch * moodAdj.pitch));
  const v = pickVoice();
  if(v) utter.voice = v;
  utter.onend = ()=>{
    const pause = item.isLastClause
      ? pauseForSentence(item.text, item.mood)
      : pauseForClause(item.text);
    narrationIndex++;
    if(isPlaying){
      setTimeout(()=>{ if(isPlaying) speakNext(); }, pause);
    }
  };
  window.speechSynthesis.speak(utter);
}

function startNarration(){
  if(!currentStory) return;
  if(!('speechSynthesis' in window)){
    document.getElementById('moodTag').textContent = 'Narration not supported in this browser';
    return;
  }
  narrationQueue = buildNarrationQueue(currentStory.sentences);
  narrationIndex = 0;
  isPlaying = true;
  document.getElementById('bars').classList.remove('paused');
  document.getElementById('playBtn').textContent = '⏸';
  setTimeout(()=>{ if(isPlaying) speakNext(); }, 600);
}

document.getElementById('playBtn').onclick = ()=>{
  if(!currentStory){ return; }
  if(!('speechSynthesis' in window)){
    document.getElementById('moodTag').textContent = 'Narration not supported in this browser';
    return;
  }
  if(isPlaying){
    window.speechSynthesis.cancel();
    isPlaying = false;
    document.getElementById('bars').classList.add('paused');
    document.getElementById('playBtn').textContent = '▶';
    return;
  }
  isPlaying = true;
  document.getElementById('bars').classList.remove('paused');
  document.getElementById('playBtn').textContent = '⏸';
  if(narrationIndex === 0 || narrationQueue.length === 0){
    narrationQueue = buildNarrationQueue(currentStory.sentences);
  }
  speakNext();
};
document.getElementById('stopBtn').onclick = stopNarration;
document.getElementById('replayBtn').onclick = ()=>{
  stopNarration();
  startNarration();
};

// ---- Remember child's name & age between visits ----
let profileSaveTimer = null;
function scheduleSaveProfile(){
  clearTimeout(profileSaveTimer);
  profileSaveTimer = setTimeout(async ()=>{
    const name = document.getElementById('childName').value.trim();
    const age = document.getElementById('childAge').value;
    if(!name) return;
    try{ await window.storage.set('profile:child', JSON.stringify({name, age}), false); }
    catch(e){ /* saving is best-effort */ }
  }, 700);
}
document.getElementById('childName').addEventListener('input', scheduleSaveProfile);
document.getElementById('childAge').addEventListener('input', scheduleSaveProfile);

(async function loadChildProfile(){
  try{
    const res = await window.storage.get('profile:child', false);
    if(res && res.value){
      const p = JSON.parse(res.value);
      if(p.name) document.getElementById('childName').value = p.name;
      if(p.age) document.getElementById('childAge').value = p.age;
    }
  }catch(e){ /* no saved profile yet, keep defaults */ }
})();

// ---- Save / load stories (persistent artifact storage) ----
const saveMsg = document.getElementById('saveMsg');

document.getElementById('saveBtn').onclick = async ()=>{
  if(!currentStory){ return; }
  saveMsg.textContent = 'Saving…';
  saveMsg.style.color = 'var(--ink-soft)';
  try{
    const record = {
      title: currentStory.title,
      sentences: currentStory.sentences,
      childName: currentChildName,
      genreId: currentGenreId,
      savedAt: Date.now()
    };
    const key = 'story:' + record.savedAt;
    const result = await window.storage.set(key, JSON.stringify(record), false);
    if(!result){ throw new Error('save did not confirm'); }
    saveMsg.textContent = 'Saved — find it under "My Stories".';
    saveMsg.style.color = 'var(--teal)';
  }catch(err){
    saveMsg.textContent = 'Could not save this story right now.';
    saveMsg.style.color = '#C4472F';
  }
};

function genreEmoji(id){
  const g = genres.find(x=>x.id===id);
  return g ? g.emoji : '📖';
}
function formatDate(ts){
  try{ return new Date(ts).toLocaleDateString(undefined, {month:'short', day:'numeric', year:'numeric'}); }
  catch(e){ return ''; }
}

const modalOverlay = document.getElementById('modalOverlay');
const savedList = document.getElementById('savedList');

document.getElementById('myStoriesBtn').onclick = ()=>{
  modalOverlay.classList.add('open');
  refreshSavedList();
};
document.getElementById('closeModalBtn').onclick = ()=> modalOverlay.classList.remove('open');
modalOverlay.addEventListener('click', (e)=>{ if(e.target === modalOverlay) modalOverlay.classList.remove('open'); });

async function refreshSavedList(){
  savedList.innerHTML = '<div class="saved-empty">Loading your stories…</div>';
  try{
    const listResult = await window.storage.list('story:', false);
    const keys = (listResult && listResult.keys) ? listResult.keys : [];
    if(keys.length === 0){
      savedList.innerHTML = '<div class="saved-empty">No saved stories yet. Generate one and hit "Save story".</div>';
      return;
    }
    const records = [];
    for(const k of keys){
      try{
        const item = await window.storage.get(k, false);
        if(item && item.value){
          const parsed = JSON.parse(item.value);
          records.push({key:k, ...parsed});
        }
      }catch(e){ /* skip unreadable entries */ }
    }
    records.sort((a,b)=> (b.savedAt||0) - (a.savedAt||0));
    if(records.length === 0){
      savedList.innerHTML = '<div class="saved-empty">No saved stories yet.</div>';
      return;
    }
    savedList.innerHTML = '';
    records.forEach(r=>{
      const row = document.createElement('div');
      row.className = 'saved-item';
      row.innerHTML = `
        <div class="saved-item-info">
          <div class="saved-item-title">${genreEmoji(r.genreId)} ${r.title || 'Untitled story'}</div>
          <div class="saved-item-meta">For ${r.childName || 'a listener'} · ${formatDate(r.savedAt)}</div>
        </div>
        <div class="saved-item-actions">
          <button class="open-btn">Open</button>
          <button class="danger delete-btn">Delete</button>
        </div>`;
      row.querySelector('.open-btn').onclick = ()=> openSavedStory(r);
      row.querySelector('.delete-btn').onclick = ()=> deleteSavedStory(r.key);
      savedList.appendChild(row);
    });
  }catch(err){
    savedList.innerHTML = '<div class="saved-empty">Could not load saved stories right now.</div>';
  }
}

function openSavedStory(r){
  stopNarration();
  selectedGenre = r.genreId;
  document.querySelectorAll('.genre-opt').forEach(o=>o.classList.remove('active'));
  renderStory({title:r.title, sentences:r.sentences}, r.childName || '');
  showStoryPage();
  modalOverlay.classList.remove('open');
  tabRead.click();
}

async function deleteSavedStory(key){
  try{
    await window.storage.delete(key, false);
    refreshSavedList();
  }catch(err){
    // leave list as-is; user can retry
  }
}
</script>
